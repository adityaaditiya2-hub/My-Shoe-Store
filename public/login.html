<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Kicks</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-image"></div>
        <div class="auth-form-container">
            <div class="auth-logo" style="font-size: 36px; font-weight: 800; font-style: italic; letter-spacing: -2px;">
                KICKS SHOES
            </div>
            <h1>YOUR ACCOUNT FOR EVERYTHING KICKS</h1>
            <p>Log in to access your orders, wishlist, and exclusive offers.</p>
            
            <form id="login-form">
                <div class="form-group">
                    <input type="email" class="form-input" id="email" placeholder="Email address" required>
                </div>
                <div class="form-group">
                    <input type="password" class="form-input" id="password" placeholder="Password" required>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 24px; font-size:14px; color:var(--text-secondary)">
                    <label style="display:flex; align-items:center; gap:8px;">
                        <input type="checkbox"> Keep me signed in
                    </label>
                    <a href="#" style="color:var(--text-secondary); text-decoration:underline;">Forgotten your password?</a>
                </div>
                
                <p style="text-align:center; margin-bottom: 24px; font-size:14px; color:var(--text-secondary)">
                    By logging in, you agree to Kicks' <a href="#" style="text-decoration:underline; color:var(--text-primary)">Privacy Policy</a> and <a href="#" style="text-decoration:underline; color:var(--text-primary)">Terms of Use</a>.
                </p>
                
                <button type="submit" class="btn" style="width:100%; border-radius:4px; padding:16px;">LOG IN</button>
            </form>
            
            <p style="text-align:center; margin-top:24px; font-size:14px; color:var(--text-secondary)">
                Not a Member? <a href="register.html" style="color:var(--text-primary); text-decoration:underline;">Join Us.</a>
            </p>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch(`${API_URL}/auth.php?action=login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    credentials: 'include',
                    body: JSON.stringify({email, password})
                });
                const data = await res.json();
                
                if (res.ok) {
                    showToast('Login successful!');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 500);
                } else {
                    showToast(data.message, 'error');
                }
            } catch (err) {
                showToast('An error occurred.', 'error');
            }
        });
    </script>
</body>
</html>
