<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bag - Kicks</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .cart-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
        }
        .cart-item {
            display: flex;
            padding: 24px 0;
            border-bottom: 1px solid var(--border);
        }
        .cart-item img {
            width: 150px;
            height: 150px;
            object-fit: contain;
            background: #f6f6f6;
            margin-right: 24px;
        }
        .cart-summary {
            padding: 24px;
            background: #f9f9f9;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <!-- Top Utility Bar -->
    <div class="top-bar">
        <div id="top-bar-auth">
            <a href="#">Help</a>
            <a href="login.html">Log In</a>
        </div>
    </div>

    <!-- Main Navigation -->
    <header class="main-header" id="main-header">
        <div class="logo-area" style="font-size: 24px; font-weight: 800; font-style: italic; letter-spacing: -1px;">
            <a href="index.html" style="color: black; text-decoration: none;">
                KICKS SHOES
            </a>
        </div>
        <nav class="nav-center">
            <a href="index.html">Shop</a>
        </nav>
        <div class="nav-right">
            <button class="icon-btn" onclick="location.href='wishlist.html'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
            </button>
            <button class="icon-btn" onclick="location.href='cart.html'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                <span class="badge-count" id="cart-count">0</span>
            </button>
        </div>
    </header>

    <div class="container">
        <div class="cart-layout">
            <div>
                <h1 style="font-size: 24px; font-weight: 500; margin-bottom: 24px;">Bag</h1>
                <div id="cart-items">
                    <!-- Injected by app.js -->
                </div>
            </div>
            
            <div class="cart-summary">
                <h2 style="font-size: 20px; font-weight: 500; margin-bottom: 24px;">Summary</h2>
                <div style="display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px;">
                    <span>Subtotal</span>
                    <span>₹<span id="cart-subtotal">0.00</span></span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 24px; font-size: 14px;">
                    <span>Estimated Delivery & Handling</span>
                    <span id="delivery-cost">Free</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 24px; padding-top: 16px; border-top: 1px solid #e5e5e5; font-size: 16px; font-weight: 500;">
                    <span>Total</span>
                    <span>₹<span id="cart-total">0.00</span></span>
                </div>
                
                <hr style="margin: 32px 0; border: none; border-top: 1px solid var(--border);">
                
                <h3 style="font-size: 16px; font-weight: 500; margin-bottom: 16px;">Checkout Details</h3>
                <form id="checkout-form">
                    <div class="form-group">
                        <input type="text" class="form-input" id="address" placeholder="Delivery Address" required>
                    </div>
                    <div class="form-group">
                        <select class="form-input" id="delivery-time" required onchange="updateTotal()">
                            <option value="Standard (3-5 Days)">Standard (3-5 Days) - Free</option>
                            <option value="Express (1-2 Days)">Express (1-2 Days) - ₹10.00</option>
                            <option value="Same Day Delivery">Same Day Delivery - ₹20.00</option>
                        </select>
                    </div>
                    <button type="submit" class="btn" style="width: 100%; border-radius: 30px; padding: 18px; margin-top: 16px;">Checkout</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderCart();
        });

        // Override renderCart to match new design
        function renderCart() {
            const container = document.getElementById('cart-items');
            const subTotalEl = document.getElementById('cart-subtotal');
            if (!container) return;
            
            if (cart.length === 0) {
                container.innerHTML = '<p>There are no items in your bag.</p>';
                if(subTotalEl) subTotalEl.innerText = '0.00';
                updateTotal();
                return;
            }
            
            let total = 0;
            container.innerHTML = cart.map((item, index) => {
                total += item.price * item.quantity;
                return `
                    <div class="cart-item">
                        <img src="${item.image_url}" alt="${item.name}">
                        <div style="flex-grow:1; display:flex; flex-direction:column; justify-content:space-between;">
                            <div>
                                <div style="display:flex; justify-content:space-between;">
                                    <h4 style="font-size:16px; font-weight:500;">${item.name}</h4>
                                    <span style="font-weight:500;">₹${item.price}</span>
                                </div>
                                <p style="color:var(--text-secondary); font-size:14px; margin-top:4px;">${item.type} Shoe</p>
                                <p style="color:var(--text-secondary); font-size:14px;">Size: ${item.size}</p>
                            </div>
                            <div style="display:flex; align-items:center; gap:24px; color:var(--text-secondary); font-size:14px;">
                                <div style="display:flex; align-items:center; gap:8px;">
                                    Quantity: 
                                    <button onclick="updateCartQuantity(${index}, -1)" style="border:none; background:none; cursor:pointer; font-size:18px">-</button>
                                    <span>${item.quantity}</span>
                                    <button onclick="updateCartQuantity(${index}, 1)" style="border:none; background:none; cursor:pointer; font-size:18px">+</button>
                                </div>
                                <button onclick="removeFromCart(${index})" style="border:none; background:none; cursor:pointer; text-decoration:underline;">Remove</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            if(subTotalEl) subTotalEl.innerText = total.toFixed(2);
            updateTotal();
        }

        function updateTotal() {
            const subtotal = parseFloat(document.getElementById('cart-subtotal').innerText);
            const deliveryType = document.getElementById('delivery-time') ? document.getElementById('delivery-time').value : '';
            let deliveryCost = 0;
            
            if (deliveryType.includes('Express')) deliveryCost = 10;
            if (deliveryType.includes('Same Day')) deliveryCost = 20;

            document.getElementById('delivery-cost').innerText = deliveryCost === 0 ? 'Free' : `₹${deliveryCost.toFixed(2)}`;
            document.getElementById('cart-total').innerText = (subtotal + deliveryCost).toFixed(2);
        }

        document.getElementById('checkout-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!currentUser) {
                showToast('Please log in to checkout.', 'error');
                return;
            }
            if (cart.length === 0) {
                showToast('Your bag is empty.', 'error');
                return;
            }

            const address = document.getElementById('address').value;
            const delivery_time = document.getElementById('delivery-time').value;
            const total_amount = parseFloat(document.getElementById('cart-total').innerText);

            try {
                const res = await fetch(`${API_URL}/orders.php`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ items: cart, total_amount, address, delivery_time })
                });
                const data = await res.json();
                
                if (res.ok) {
                    showToast('Order placed successfully!');
                    console.log(`[EMAIL SIMULATION] Sent to ${currentUser.email}: Order #${data.order_id} confirmed.`);
                    cart = [];
                    saveCart();
                    setTimeout(() => window.location.href = 'index.html', 2000);
                } else {
                    showToast(data.message, 'error');
                }
            } catch (err) {
                showToast('An error occurred.', 'error');
            }
        });
    </script>
</body>
</html>
